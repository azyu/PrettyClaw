<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="libBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#120e18"/>
    </linearGradient>
    <radialGradient id="lampLight" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#libBg)"/>
  <rect width="1920" height="1080" fill="url(#lampLight)"/>
  <!-- Bookshelves left -->
  <g>
    <rect x="50" y="100" width="400" height="600" fill="#2a1f20" stroke="#3a2a2a" stroke-width="2" rx="4"/>
    <!-- Shelves -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#3a2a2a" stroke-width="3"/>
    <line x1="50" y1="400" x2="450" y2="400" stroke="#3a2a2a" stroke-width="3"/>
    <line x1="50" y1="550" x2="450" y2="550" stroke="#3a2a2a" stroke-width="3"/>
    <!-- Books row 1 -->
    <g transform="translate(60, 110)">
      <rect width="25" height="130" fill="#8B0000" rx="2"/>
      <rect x="28" width="20" height="130" fill="#00008B" rx="2"/>
      <rect x="51" width="30" height="130" fill="#006400" rx="2"/>
      <rect x="84" width="22" height="130" fill="#8B4513" rx="2"/>
      <rect x="109" width="28" height="130" fill="#4B0082" rx="2"/>
      <rect x="140" width="18" height="130" fill="#800000" rx="2"/>
      <rect x="161" width="25" height="130" fill="#191970" rx="2"/>
      <rect x="189" width="22" height="130" fill="#556B2F" rx="2"/>
      <rect x="214" width="30" height="130" fill="#8B0000" rx="2"/>
      <rect x="247" width="20" height="130" fill="#2F4F4F" rx="2"/>
      <rect x="270" width="25" height="130" fill="#4B0082" rx="2"/>
      <rect x="298" width="28" height="130" fill="#006400" rx="2"/>
      <rect x="329" width="18" height="130" fill="#800000" rx="2"/>
    </g>
    <!-- Books row 2 -->
    <g transform="translate(60, 260)">
      <rect width="30" height="130" fill="#4B0082" rx="2"/>
      <rect x="33" width="22" height="130" fill="#8B4513" rx="2"/>
      <rect x="58" width="25" height="130" fill="#006400" rx="2"/>
      <rect x="86" width="18" height="130" fill="#8B0000" rx="2"/>
      <rect x="107" width="28" height="130" fill="#191970" rx="2"/>
      <rect x="138" width="25" height="130" fill="#556B2F" rx="2"/>
      <rect x="166" width="20" height="130" fill="#800000" rx="2"/>
      <rect x="189" width="30" height="130" fill="#2F4F4F" rx="2"/>
      <rect x="222" width="22" height="130" fill="#4B0082" rx="2"/>
      <rect x="247" width="25" height="130" fill="#8B0000" rx="2"/>
      <rect x="275" width="28" height="130" fill="#006400" rx="2"/>
      <rect x="306" width="20" height="130" fill="#8B4513" rx="2"/>
