    <rect x="1470" y="100" width="400" height="600" fill="#2a1f20" stroke="#3a2a2a" stroke-width="2" rx="4"/>
    <line x1="1470" y1="250" x2="1870" y2="250" stroke="#3a2a2a" stroke-width="3"/>
    <line x1="1470" y1="400" x2="1870" y2="400" stroke="#3a2a2a" stroke-width="3"/>
