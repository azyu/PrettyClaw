      <rect x="28" width="22" height="130" fill="#8B0000" rx="2"/>
      <rect x="53" width="28" height="130" fill="#191970" rx="2"/>
      <rect x="84" width="20" height="130" fill="#4B0082" rx="2"/>
      <rect x="107" width="25" height="130" fill="#8B4513" rx="2"/>
      <rect x="135" width="30" height="130" fill="#800000" rx="2"/>
      <rect x="168" width="22" height="130" fill="#2F4F4F" rx="2"/>
      <rect x="193" width="25" height="130" fill="#556B2F" rx="2"/>
      <rect x="221" width="18" height="130" fill="#8B0000" rx="2"/>
      <rect x="242" width="28" height="130" fill="#006400" rx="2"/>
      <rect x="273" width="22" height="130" fill="#4B0082" rx="2"/>
      <rect x="298" width="25" height="130" fill="#191970" rx="2"/>
    </g>
    <g transform="translate(1480, 260)">
      <rect width="22" height="130" fill="#800000" rx="2"/>
      <rect x="25" width="28" height="130" fill="#006400" rx="2"/>
      <rect x="56" width="20" height="130" fill="#8B4513" rx="2"/>
      <rect x="79" width="25" height="130" fill="#4B0082" rx="2"/>
      <rect x="107" width="30" height="130" fill="#8B0000" rx="2"/>
      <rect x="140" width="22" height="130" fill="#2F4F4F" rx="2"/>
      <rect x="165" width="25" height="130" fill="#191970" rx="2"/>
      <rect x="193" width="18" height="130" fill="#556B2F" rx="2"/>
      <rect x="214" width="28" height="130" fill="#800000" rx="2"/>
      <rect x="245" width="22" height="130" fill="#006400" rx="2"/>
      <rect x="270" width="25" height="130" fill="#8B0000" rx="2"/>
    </g>
  </g>
  <!-- Floor -->
  <rect x="0" y="700" width="1920" height="380" fill="#1a1515"/>
  <line x1="0" y1="700" x2="1920" y2="700" stroke="#2a2020" stroke-width="2"/>
  <!-- Reading desk -->
  <rect x="700" y="550" width="520" height="20" fill="#3a2a20" rx="3"/>
  <rect x="720" y="570" width="15" height="130" fill="#2a1a15"/>
  <rect x="1185" y="570" width="15" height="130" fill="#2a1a15"/>
  <!-- Open book on desk -->
  <g transform="translate(900, 510)">
    <rect x="-40" y="0" width="40" height="35" fill="#F5F5DC" rx="1" transform="skewY(-5)"/>
    <rect x="2" y="0" width="40" height="35" fill="#FAEBD7" rx="1" transform="skewY(5)"/>
    <line x1="-35" y1="8" x2="-5" y2="6" stroke="#999" stroke-width="0.5"/>
    <line x1="-35" y1="14" x2="-5" y2="12" stroke="#999" stroke-width="0.5"/>
    <line x1="-35" y1="20" x2="-5" y2="18" stroke="#999" stroke-width="0.5"/>
    <line x1="7" y1="6" x2="37" y2="8" stroke="#999" stroke-width="0.5"/>
    <line x1="7" y1="12" x2="37" y2="14" stroke="#999" stroke-width="0.5"/>
    <line x1="7" y1="18" x2="37" y2="20" stroke="#999" stroke-width="0.5"/>
  </g>
  <!-- Chandelier -->
  <g transform="translate(960, 0)">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#5a4a3a" stroke-width="2"/>
    <circle cx="0" cy="70" r="15" fill="#FFD700" opacity="0.15"/>
    <rect x="-20" y="58" width="40" height="15" fill="#5a4a3a" rx="3"/>
  </g>
