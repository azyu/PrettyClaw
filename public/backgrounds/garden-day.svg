<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="daySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#B0E0E6"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="75%" cy="20%">
      <stop offset="0%" stop-color="#FFE4B5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#daySky)"/>
  <rect width="1920" height="1080" fill="url(#sunGlow)"/>
  <!-- Sun -->
  <circle cx="1440" cy="200" r="60" fill="#FFD700" opacity="0.8"/>
  <!-- Clouds -->
  <g opacity="0.6" fill="#fff">
    <ellipse cx="400" cy="150" rx="120" ry="40"/>
    <ellipse cx="350" cy="140" rx="80" ry="35"/>
    <ellipse cx="460" cy="145" rx="70" ry="30"/>
  </g>
  <g opacity="0.4" fill="#fff">
    <ellipse cx="1100" cy="120" rx="100" ry="35"/>
    <ellipse cx="1060" cy="115" rx="70" ry="28"/>
    <ellipse cx="1150" cy="118" rx="60" ry="25"/>
  </g>
  <!-- Grass ground -->
  <rect x="0" y="650" width="1920" height="430" fill="#4CAF50"/>
  <rect x="0" y="650" width="1920" height="30" fill="#66BB6A"/>
  <!-- Cherry blossom trees -->
  <g>
    <rect x="280" y="350" width="40" height="300" fill="#8B6914" rx="5"/>
    <circle cx="300" cy="280" r="120" fill="#FFB6C1" opacity="0.8"/>
    <circle cx="250" cy="310" r="80" fill="#FFC0CB" opacity="0.7"/>
    <circle cx="360" cy="300" r="90" fill="#FFB6C1" opacity="0.6"/>
  </g>
  <g>
    <rect x="1500" y="400" width="35" height="250" fill="#8B6914" rx="5"/>
    <circle cx="1520" cy="330" r="100" fill="#FFB6C1" opacity="0.7"/>
    <circle cx="1470" cy="350" r="70" fill="#FFC0CB" opacity="0.6"/>
    <circle cx="1570" cy="345" r="80" fill="#FFB6C1" opacity="0.5"/>
  </g>
  <!-- Petals falling -->
  <g fill="#FFB6C1" opacity="0.6">
    <ellipse cx="500" cy="400" rx="4" ry="6" transform="rotate(30 500 400)"/>
    <ellipse cx="700" cy="350" rx="3" ry="5" transform="rotate(-20 700 350)"/>
    <ellipse cx="900" cy="450" rx="4" ry="6" transform="rotate(45 900 450)"/>
    <ellipse cx="1200" cy="380" rx="3" ry="5" transform="rotate(-10 1200 380)"/>
    <ellipse cx="1350" cy="500" rx="4" ry="6" transform="rotate(25 1350 500)"/>
  </g>
  <!-- Stone path -->
  <g fill="#9E9E9E" opacity="0.5">
    <ellipse cx="960" cy="750" rx="40" ry="15"/>
    <ellipse cx="920" cy="800" rx="35" ry="12"/>
    <ellipse cx="970" cy="850" rx="38" ry="14"/>
    <ellipse cx="940" cy="900" rx="35" ry="12"/>
    <ellipse cx="960" cy="950" rx="40" ry="15"/>
  </g>
  <!-- Fence -->
  <g stroke="#D2B48C" stroke-width="3" fill="none">
    <line x1="0" y1="630" x2="1920" y2="630"/>
    <line x1="0" y1="660" x2="1920" y2="660"/>
  </g>
  <g fill="#D2B48C">
    <rect x="100" y="610" width="8" height="65" rx="2"/>
    <rect x="250" y="610" width="8" height="65" rx="2"/>
    <rect x="400" y="610" width="8" height="65" rx="2"/>
    <rect x="550" y="610" width="8" height="65" rx="2"/>
    <rect x="700" y="610" width="8" height="65" rx="2"/>
  </g>
</svg>
