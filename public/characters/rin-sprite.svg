<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700">
  <defs>
    <linearGradient id="rinHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8aaff"/>
      <stop offset="100%" stop-color="#8866cc"/>
    </linearGradient>
    <linearGradient id="rinDress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a3e"/>
      <stop offset="100%" stop-color="#1a1028"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="200" cy="690" rx="80" ry="10" fill="#000" opacity="0.2"/>
  <!-- Dress - more formal/scholarly -->
  <path d="M145 340 Q135 490 110 680 L290 680 Q265 490 255 340 Z" fill="url(#rinDress)" stroke="#4a3a5e" stroke-width="1"/>
  <!-- Vest detail -->
  <path d="M160 340 L200 440 L240 340 Z" fill="#3a2a4e" stroke="#5a4a6e" stroke-width="1"/>
  <!-- Tie -->
  <path d="M195 340 L200 400 L205 340" fill="#aa7aff" stroke="#8866cc" stroke-width="1"/>
  <polygon points="195,340 205,340 200,350" fill="#aa7aff"/>
  <!-- Neck -->
  <rect x="185" y="300" width="30" height="45" fill="#FFE0D0" rx="5"/>
  <!-- Head -->
  <ellipse cx="200" cy="240" rx="63" ry="73" fill="#FFE0D0"/>
  <!-- Hair back - long straight -->
  <path d="M133 220 Q125 350 120 500 Q140 470 142 350 Q143 280 138 220 Z" fill="url(#rinHair)"/>
  <path d="M267 220 Q275 350 280 500 Q260 470 258 350 Q257 280 262 220 Z" fill="url(#rinHair)"/>
  <!-- More back hair -->
  <path d="M140 220 Q130 350 130 480 Q145 450 148 340 Q149 280 145 220 Z" fill="url(#rinHair)" opacity="0.8"/>
  <path d="M260 220 Q270 350 270 480 Q255 450 252 340 Q251 280 255 220 Z" fill="url(#rinHair)" opacity="0.8"/>
  <!-- Hair front -->
  <path d="M137 225 Q142 168 172 156 Q192 150 200 153 Q208 150 228 156 Q258 168 263 225 L257 202 Q240 175 200 168 Q160 175 143 202 Z" fill="url(#rinHair)"/>
  <!-- Bangs - straight cut -->
  <rect x="142" y="200" width="22" height="28" fill="url(#rinHair)" rx="2"/>
  <rect x="167" y="198" width="22" height="30" fill="url(#rinHair)" rx="2"/>
  <rect x="192" y="197" width="22" height="30" fill="url(#rinHair)" rx="2"/>
  <rect x="217" y="198" width="22" height="28" fill="url(#rinHair)" rx="2"/>
  <rect x="242" y="200" width="20" height="26" fill="url(#rinHair)" rx="2"/>
  <!-- Eyes - sharp, intelligent -->
  <g transform="translate(172, 242)">
    <ellipse rx="11" ry="13" fill="#fff"/>
    <ellipse rx="7" ry="9" fill="#7744BB"/>
    <ellipse rx="4" ry="5" fill="#5522AA"/>
    <circle cx="3" cy="-4" r="3" fill="#fff" opacity="0.8"/>
  </g>
  <g transform="translate(228, 242)">
    <ellipse rx="11" ry="13" fill="#fff"/>
    <ellipse rx="7" ry="9" fill="#7744BB"/>
    <ellipse rx="4" ry="5" fill="#5522AA"/>
    <circle cx="3" cy="-4" r="3" fill="#fff" opacity="0.8"/>
  </g>
  <!-- Eyebrows - sharp -->
  <path d="M157 220 Q168 213 183 218" fill="none" stroke="#8866cc" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M217 218 Q232 213 243 220" fill="none" stroke="#8866cc" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glasses -->
  <circle cx="172" cy="242" r="18" fill="none" stroke="#8a7aaa" stroke-width="1.5"/>
  <circle cx="228" cy="242" r="18" fill="none" stroke="#8a7aaa" stroke-width="1.5"/>
  <line x1="190" y1="242" x2="210" y2="242" stroke="#8a7aaa" stroke-width="1.5"/>
  <line x1="154" y1="240" x2="140" y2="236" stroke="#8a7aaa" stroke-width="1.5"/>
  <line x1="246" y1="240" x2="260" y2="236" stroke="#8a7aaa" stroke-width="1.5"/>
  <!-- Nose -->
  <path d="M198 258 Q200 262 202 258" fill="none" stroke="#E0B8A0" stroke-width="1.5"/>
  <!-- Mouth - composed -->
  <path d="M190 278 Q200 282 210 278" fill="none" stroke="#D08080" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Blush - subtle -->
  <ellipse cx="165" cy="265" rx="10" ry="5" fill="#FFB6C1" opacity="0.2"/>
  <ellipse cx="235" cy="265" rx="10" ry="5" fill="#FFB6C1" opacity="0.2"/>
  <!-- Book in hand -->
  <g transform="translate(290, 450) rotate(-10)">
    <rect x="-15" y="-40" width="30" height="50" fill="#3a2a4e" stroke="#5a4a6e" stroke-width="1" rx="2"/>
    <line x1="-10" y1="-30" x2="10" y2="-30" stroke="#aa7aff" stroke-width="0.5" opacity="0.5"/>
    <line x1="-10" y1="-22" x2="10" y2="-22" stroke="#aa7aff" stroke-width="0.5" opacity="0.5"/>
    <line x1="-10" y1="-14" x2="5" y2="-14" stroke="#aa7aff" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>
